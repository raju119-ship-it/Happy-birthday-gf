<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Manju 💫</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff4f8b,#ff9ac2,#ffd8e8);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#start{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#start button{
padding:18px 40px;
font-size:24px;
border:none;
border-radius:40px;
background:#ff4d94;
color:white;
cursor:pointer;
box-shadow:0 0 20px white;
}

.card{
display:none;
text-align:center;
max-width:700px;
padding:30px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

h1{
font-size:55px;
margin-bottom:20px;
}

h2{
margin-bottom:20px;
}

p{
font-size:20px;
line-height:1.8;
}

.balloon{
position:absolute;
bottom:-100px;
font-size:40px;
animation:float linear infinite;
}

@keyframes float{
to{
transform:translateY(-120vh);
}
}

.heart{
position:absolute;
font-size:20px;
animation:heart 8s linear infinite;
}

@keyframes heart{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>
<body>

<div id="start">
<button onclick="openGift()">🎁 Tap To Open Your Surprise</button>
</div>

<div class="card" id="card">

<h1>🎂 Happy Birthday Manju 💫</h1>

<h2>❤️ My Forever Love ❤️</h2>
